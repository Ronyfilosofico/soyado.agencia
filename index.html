<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soyado Agencia</title>

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:#fff;overflow-x:hidden;}

header{
position:fixed;width:100%;top:0;background:#0b0b0b;
display:flex;justify-content:center;flex-wrap:wrap;
gap:20px;padding:15px;z-index:1000;
}
header button{
background:none;border:none;color:#eab22f;
cursor:pointer;font-weight:bold;
}

.section{
display:none;
padding:100px 20px 40px;
background:#0b0b0b;
min-height:100vh;
}
.active{display:block;}

.hero{
height:100vh;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
url('https://images.unsplash.com/photo-1516035069371-29a1b244cc32');
background-size:cover;background-position:center;
display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;
}

.highlight{color:#eab22f;font-weight:bold;}

.catalogo,.packs{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{background:#141414;border-radius:10px;overflow:hidden;}
.card img{width:100%;height:200px;object-fit:contain;background:#000;}
.card-content{padding:15px;}
.precio{color:#eab22f;}

.pack{background:#111;border-radius:12px;overflow:hidden;}
.pack img{width:100%;height:200px;object-fit:cover;}
.pack-content{padding:15px;}

.filtros{text-align:center;margin-bottom:20px;}
.filtros button{margin:5px;padding:8px;border:none;cursor:pointer;font-weight:bold;}

.grid-condiciones{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;margin-top:40px;
}
.condicion{background:#141414;padding:20px;border-radius:10px;}
.condicion b{color:#eab22f;}

.logos-pagos{
display:flex;justify-content:center;gap:20px;background:#fff;padding:20px;border-radius:10px;margin-top:20px;
}
.logos-pagos img{height:50px;}

.servicios{
display:flex;flex-wrap:wrap;justify-content:center;gap:20px;
}
.servicio{background:#141414;padding:20px;border-radius:10px;}
.servicio h3{color:#eab22f;}

form{max-width:600px;margin:auto;}
input,select,textarea{width:100%;padding:10px;margin:10px 0;border:none;border-radius:6px;}

.about{text-align:center;max-width:800px;margin:auto;}

.btn{
margin-top:10px;padding:10px;background:#eab22f;color:black;border:none;border-radius:6px;cursor:pointer;font-weight:bold;
}

.whatsapp{
position:fixed;bottom:20px;right:20px;
background:#25D366;color:white;padding:15px;border-radius:50%;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<button onclick="show('home')">Inicio</button>
<button onclick="show('packs')">Packs</button>
<button onclick="show('equipos')">Equipos</button>
<button onclick="show('servicios')">Servicios</button>
<button onclick="show('cotizacion')">Cotizaciones</button>
<button onclick="show('sobre')">Sobre nosotros</button>
<button onclick="window.open('checklist.html')">Checklist</button>
</header>

<section id="home" class="hero active">
<h1>Soyado Agencia</h1>
<p class="highlight">Rental de equipos audiovisuales con operador incluido</p>
<p><b>Creamos atmósferas visuales a través de la luz</b></p>
</section>

<section id="packs" class="section">
<h2>Packs recomendados</h2>
<div class="packs">
<div class="pack"><img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7"><div class="pack-content"><h3>Entrevista Pro</h3><p class="precio">$350K – $750K</p></div></div>
<div class="pack"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"><div class="pack-content"><h3>Videoclip</h3><p class="precio">$600K – $1.4M</p></div></div>
<div class="pack"><img src="https://images.unsplash.com/photo-1519183071298-a2962be96f83"><div class="pack-content"><h3>Fotografía</h3><p class="precio">$400K – $1M</p></div></div>
</div>
</section>

<section id="equipos" class="section">
<h2>Equipos</h2>

<div class="filtros">
<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('luz')">Iluminación</button>
<button onclick="filtrar('gimbal')">Gimbals</button>
<button onclick="filtrar('soporte')">Soportes</button>
<button onclick="filtrar('modificador')">Modificadores</button>
<button onclick="filtrar('tripode')">Trípodes</button>
<button onclick="filtrar('audio')">Audio</button>
<button onclick="filtrar('trigger')">Triggers</button>
</div>

<div id="catalogo" class="catalogo"></div>
</section>

<script>
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.querySelector('.hero').classList.remove('active');
if(id==='home'){document.querySelector('.hero').classList.add('active');}
else{document.getElementById(id).classList.add('active');}
window.scrollTo(0,0);
}

const equipos=[

{nombre:"C-Stand (1 unidad)",img:"images/cstand.jpg",precio4h:30000,precio8h:40000,categoria:"soporte"},
{nombre:"Tripode (varias unidades)",img:"images/tripode.jpg",precio4h:18000,precio8h:25000,categoria:"soporte"},
{nombre:"DJI Ronin 3 Pro Combo (1 unidad)",img:"images/ronin4.jpg",precio4h:180000,precio8h:250000,categoria:"gimbal"},

{nombre:"Godox AD600 BM II (1 unidad)",img:"images/godox-ad600.jpg",precio4h:130000,precio8h:180000,categoria:"luz"},

{nombre:"Comica VM40 Micrófono",img:"images/Comicavm40.jpg",precio4h:80000,precio8h:120000,categoria:"audio"},
{nombre:"Softbox 85cm",img:"images/modificador85.jpg",precio4h:25000,precio8h:40000,categoria:"modificador"},
{nombre:"Sombrilla 165cm",img:"images/sombrilla165.jpg",precio4h:35000,precio8h:60000,categoria:"modificador"},
{nombre:"Sombrilla 180cm",img:"images/sombrilla180.jpg",precio4h:40000,precio8h:65000,categoria:"modificador"},
{nombre:"Linterna 85cm",img:"images/linterna85.jpg",precio4h:25000,precio8h:45000,categoria:"modificador"},

{nombre:"Tripode Neewer",img:"images/tripodenw.jpg",precio4h:80000,precio8h:125000,categoria:"tripode"},

{nombre:"Godox X2T",img:"images/x2t.jpg",precio4h:25000,precio8h:40000,categoria:"trigger"}

];

function render(lista){
const cont=document.getElementById('catalogo');
cont.innerHTML='';
lista.forEach(e=>{
cont.innerHTML+=`
<div class="card">
<img src="${e.img}">
<div class="card-content">
<h3>${e.nombre}</h3>
<p class="precio">4h $${e.precio4h}</p>
<p class="precio">8h $${e.precio8h}</p>
</div>
</div>`;
});
}

function filtrar(cat){
if(cat==='todos') render(equipos);
else render(equipos.filter(e=>e.categoria===cat));
}

render(equipos);
</script>

</body>
</html>
